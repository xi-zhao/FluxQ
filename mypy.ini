[mypy]
python_version = 3.11
files = src
ignore_missing_imports = true
warn_unused_configs = true
show_error_codes = true
pretty = true

[mypy-quantum_runtime.reporters.summary]
disable_error_code = attr-defined,arg-type

[mypy-quantum_runtime.intent.markdown]
disable_error_code = import-untyped

[mypy-quantum_runtime.intent.parser]
disable_error_code = arg-type,call-overload

[mypy-quantum_runtime.intent.planner]
ignore_errors = true

[mypy-quantum_runtime.runtime.executor]
ignore_errors = true

[mypy-quantum_runtime.diagnostics.transpile_validate]
disable_error_code = attr-defined,misc
